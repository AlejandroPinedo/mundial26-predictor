name: Sync shot map

# Regenera el shot map del WC2026 (API oficial de FIFA) y lo guarda en la tabla
# shot_map_cache. El endpoint GET /football/shot-map solo lee de ahí.
#
# RED DE SEGURIDAD (backfill): el refresco PRINCIPAL ocurre al culminar cada
# partido, dentro de POST /cron/sync-results (ver routes/cron.ts), que el pinger
# externo dispara cada ~1 min. Esta corrida diaria solo cubre huecos (p. ej. si
# FIFA finaliza el timeline de un partido más tarde, o si se perdió un tick).
# No necesita token de FIFA (API pública); solo DATABASE_URL para escribir.

on:
  schedule:
    - cron: '17 6 * * *' # diario ~06:17 UTC
  workflow_dispatch: {} # disparo manual desde la pestaña Actions

concurrency:
  group: shot-map
  cancel-in-progress: false

jobs:
  sync:
    name: Rebuild shot map
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild shot map
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run sync:shotmap -- --apply
