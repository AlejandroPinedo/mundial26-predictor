name: Oracle pick lock

# Congela las predicciones de grupo del Pez Oráculo cuyo saque ya pasó, para que
# se registren puntualmente sin depender de cuándo el admin carga resultados.
# El script (npm run seed:oracle) es idempotente y solo escribe picks vencidos.
#
# IMPORTANTE: los triggers `schedule` solo corren desde la rama por defecto (main).
# Solo es relevante durante la fase de grupos; puede desactivarse al terminar.

on:
  schedule:
    # Cada ~15 min en minutos sueltos (NO en la hora en punto): GitHub retrasa o
    # saltea los cron a la hora en punto por la carga. Así un pick se congela
    # dentro de ~15 min de su saque sin depender de la carga de resultados.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {} # permite ejecución manual desde la pestaña Actions

# Evita solapamientos si una corrida tarda más que el intervalo.
concurrency:
  group: oracle-lock
  cancel-in-progress: false

jobs:
  lock:
    name: Lock due Oracle predictions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lock due Oracle predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed:oracle
