name: Oracle pick lock

# Congela las predicciones de grupo del Pez Oráculo cuyo saque ya pasó.
# El script (npm run seed:oracle) es idempotente y solo escribe picks vencidos.
#
# La cadencia normal la maneja ahora el endpoint POST /cron/sync-results (pinger
# externo cada ~1 min), porque el cron de GitHub Actions se estrangula a ~cada
# 3-4 h. Aquí queda SOLO el disparo manual como respaldo (p. ej. forzar un lock).

on:
  workflow_dispatch: {} # ejecución manual desde la pestaña Actions

# Evita solapamientos si una corrida tarda más que el intervalo.
concurrency:
  group: oracle-lock
  cancel-in-progress: false

jobs:
  lock:
    name: Lock due Oracle predictions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lock due Oracle predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed:oracle
