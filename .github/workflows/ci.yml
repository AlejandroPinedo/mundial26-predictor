  name: CI

  on:
    pull_request:
      branches: [develop, main]

  jobs:
    test-backend:
      name: Backend Tests
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: backend
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4                                                   
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: backend/package-lock.json

        - name: Install dependencies
          run: npm ci
  
        - name: Run tests
          run: npm test

    test-frontend:
      name: Frontend Tests
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: frontend
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
  
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json

        - name: Install dependencies
          run: npm ci                                                                   

        - name: Run tests
          run: npm test
